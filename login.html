<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css?v=20260428-2" rel="stylesheet">
  <link href="./css/login.css?v=20260428-3" rel="stylesheet">

  <style type="text/css">

  </style>
</head>
<body>
<div id="app">
  <div class="login-container">
    <div class="header">
      <div class="header-back-btn" @click="goBack" ><i class="el-icon-arrow-left"></i></div>
      <div class="header-title">手机号码快捷登录&nbsp;&nbsp;&nbsp;</div>
    </div>
    <div class="content">
      <div class="login-form">
        <div style="display: flex; justify-content: space-between">
          <el-input style="width: 60%" placeholder="请输入手机号" v-model="form.phone" >
          </el-input>
          <el-button style="width: 38%" @click="sendCode" type="success" :disabled="disabled">{{codeBtnMsg}}</el-button>
        </div>

        <div style="height: 5px"></div>
        <el-input placeholder="请输入验证码" v-model="form.code">
        </el-input>
        <div style="text-align: center; color: #8c939d;margin: 5px 0">未注册的手机号码验证后自动创建账户</div>
        <el-button @click="login('user')" style="width: 100%; background-color:#f63; color: #fff;">登录</el-button>
        <div style="text-align: right; color:#333333; margin: 5px 0"><a href="/login2.html">密码登录</a></div>
        <div class="merchant-login-card">
          <div>
            <div class="merchant-title">商家运营入口</div>
            <div class="merchant-sub">已绑定店铺的账号可进入商家运营 Agent 工作台</div>
          </div>
          <el-button class="merchant-btn" @click="login('merchant')">商家登录</el-button>
        </div>
      </div>
      <div class="login-agreement" :class="{checked: radio}" @click="toggleAgreement">
        <button class="agreement-check" type="button" :aria-pressed="radio ? 'true' : 'false'">
          <i class="el-icon-check" v-if="radio"></i>
        </button>
        <div class="agreement-text">我已阅读并同意
          <a href="javascript:void(0)">
          《黑马点评用户服务协议》</a>、
          <a href="javascript:void(0)">《隐私政策》</a>
          等，接受免除或者限制责任、诉讼管辖约定等粗体标示条款
        </div>
      </div>
    </div>
  </div>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js?v=20260428-2"></script>
<script src="./js/footer.js?v=20260428-2"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      radio: false,
      disabled: false, // 发送短信按钮
      codeBtnMsg: "发送验证码", // 发送短信按钮提示
      form:{
      }
    },
    methods: {
      login(target){
        if(!this.radio){
          this.$message.error("请先确认阅读用户协议！");
          return
        }
        if(!this.form.phone || !this.form.code){
          this.$message.error("手机号和验证码不能为空！");
          return
        }
        axios.post("/user/login", this.form)
        .then(({data}) => {
            if(data){
              // 保存用户信息到session
              sessionStorage.setItem("token", data);
            }
            if (target === "merchant") {
              return axios.get("/merchant/me", {headers: {authorization: data}});
            }
            location.href = "/index.html";
            return Promise.reject("redirected");
        })
        .then(({data}) => {
            if (data && data.isMerchant) {
              location.href = "/merchant-agent.html";
            } else {
              this.$message.error("当前账号未绑定商家店铺");
            }
        })
        .catch(err => {
            if (err !== "redirected") {
              this.$message.error(err)
            }
        })
      },
      toggleAgreement(){
        // 学习提示：把整行协议做成点击区域，比只点小圆点更适合移动端。
        this.radio = !this.radio;
      },
      goBack(){
        history.back();
      },
      sendCode(){
        if (!this.form.phone) {
          this.$message.error("手机号不能为空");
          return;
        }
        // 发送验证码
        axios.post("/user/code?phone="+this.form.phone)
          .then(() => {})
          .catch(err => {
            console.log(err);
            this.$message.error(err)
          });
        // 禁用按钮
        this.disabled = true;
        // 按钮倒计时
        let i = 60;
        this.codeBtnMsg = (i--) + '秒后可重发'
        let taskId = setInterval(() => this.codeBtnMsg = (i--) + '秒后可重发', 1000);
        setTimeout(() => {
          this.disabled = false;
          clearInterval(taskId);
          this.codeBtnMsg = "发送验证码";
        }, 59000)
      }
    }
  })
</script>
</body>
</html>
