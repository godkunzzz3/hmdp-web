<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>附近商户</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css?v=20260428-2" rel="stylesheet">
  <style>
    .map-page { height: 100%; background: #f6f7fb; overflow: hidden; }
    .map-hero { height: 190px; padding: 16px; box-sizing: border-box; color: #fff; background: linear-gradient(135deg, #ff6633, #ff9f43); position: relative; overflow: hidden; }
    .map-hero:after { content: ""; position: absolute; right: -40px; top: -30px; width: 150px; height: 150px; border-radius: 50%; background: rgba(255,255,255,.16); }
    .map-title { font-size: 22px; font-weight: 800; margin-top: 6px; }
    .map-subtitle { margin-top: 8px; opacity: .88; line-height: 20px; }
    .location-card { margin-top: 18px; display: flex; gap: 8px; align-items: center; }
    .location-card .el-input__inner { border: none; border-radius: 18px; }
    .loc-input { width: 34%; }
    .map-content { height: calc(100% - 190px); overflow-y: auto; padding: 12px 12px 76px; box-sizing: border-box; }
    .type-scroll { display: flex; overflow-x: auto; padding-bottom: 8px; }
    .type-chip { flex: 0 0 auto; padding: 8px 14px; margin-right: 8px; background: #fff; border-radius: 18px; color: #5f6672; box-shadow: 0 4px 14px rgba(31,35,41,.05); }
    .type-chip.active { color: #fff; background: #ff6633; }
    .shop-card { background: #fff; border-radius: 12px; padding: 12px; margin: 10px 0; box-shadow: 0 8px 22px rgba(31,35,41,.06); display: flex; gap: 12px; }
    .shop-cover { width: 88px; height: 88px; border-radius: 10px; object-fit: cover; background: #eee; }
    .shop-main { flex: 1; min-width: 0; }
    .shop-name { font-size: 16px; font-weight: 800; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .shop-meta { margin-top: 8px; color: #7b828c; line-height: 20px; }
    .distance { color: #ff6633; font-weight: 700; }
  </style>
</head>
<body>
<div id="app" class="map-page">
  <div class="map-hero">
    <div class="map-title">附近好店</div>
    <div class="map-subtitle">基于 Redis GEO 查询周边商户，默认使用杭州拱墅附近坐标。</div>
    <div class="location-card">
      <el-input class="loc-input" size="small" v-model="x" placeholder="经度"></el-input>
      <el-input class="loc-input" size="small" v-model="y" placeholder="纬度"></el-input>
      <el-button size="small" round @click="queryShops">搜索</el-button>
    </div>
  </div>
  <div class="map-content">
    <div class="type-scroll">
      <div class="type-chip" v-for="t in types" :key="t.id" :class="{active: t.id === typeId}" @click="selectType(t.id)">{{t.name}}</div>
    </div>
    <div class="shop-card" v-for="s in shops" :key="s.id" @click="toShop(s.id)">
      <img class="shop-cover" :src="cover(s)" alt="">
      <div class="shop-main">
        <div class="shop-name">{{s.name}}</div>
        <div class="shop-meta">{{s.area || '附近'}} · 人均 {{s.avgPrice || '-'}} 元</div>
        <div class="shop-meta">{{s.address}}</div>
        <div class="shop-meta distance" v-if="s.distance">{{formatDistance(s.distance)}}</div>
      </div>
    </div>
    <div class="empty-state" v-if="shops.length === 0">暂无附近商户</div>
  </div>
  <foot-bar :active-btn="2"></foot-bar>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js?v=20260428-2"></script>
<script src="./js/footer.js?v=20260428-2"></script>
<script>
  new Vue({
    el: "#app",
    data: {
      types: [],
      shops: [],
      typeId: 1,
      x: "120.149192",
      y: "30.316078",
      current: 1
    },
    created() {
      this.queryTypes();
    },
    methods: {
      queryTypes() {
        axios.get("/shop-type/list").then(({data}) => {
          this.types = data || [];
          if (this.types.length) this.typeId = this.types[0].id;
          this.queryShops();
        }).catch(err => this.$message.error(err));
      },
      selectType(id) {
        this.typeId = id;
        this.current = 1;
        this.queryShops();
      },
      queryShops() {
        axios.get("/shop/of/type", {params: {typeId: this.typeId, current: this.current, x: this.x, y: this.y}})
          .then(({data}) => this.shops = data || [])
          .catch(err => this.$message.error(err));
      },
      cover(shop) {
        return (shop.images || "").split(",")[0] || "/imgs/icons/default-icon.png";
      },
      formatDistance(v) {
        return v < 1000 ? Math.round(v) + " m" : (v / 1000).toFixed(2) + " km";
      },
      toShop(id) {
        location.href = "/shop-detail.html?id=" + id;
      }
    }
  })
</script>
</body>
</html>
